schema = 1
language = "0.1-design"

[package]
name = "appliance"
version = "0.1.0"
source_root = "src"

[[module]]
name = "appliance.image"
path = "appliance/image.wr"

[[module]]
name = "appliance.runtime"
path = "appliance/runtime.wr"

[[dependency]]
alias = "core"
package = "wrela-core"
requirement = "=0.1.0"

[[dependency]]
alias = "net"
package = "network"
requirement = "=2.3.4"

[[profile]]
name = "release"
mode = "release"
comptime_steps = 20000000
comptime_memory_bytes = 134217728
comptime_call_depth = 512
static_bytes = 268435456
peak_bytes = 805306368
event_log_bytes = 67108864
dma_coherent = true
require_iommu = true
reset_timeout_ns = 9000000000
quarantine_bytes = 33554432
recording = "record"
optimization = "performance"
profile_data = "dddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddd"
sealed_deployment = true
warnings_as_errors = true
watchdogs = false

[[image]]
name = "appliance"
module = "appliance.image"
entry = "image"
target = "aarch64-qemu-virt-uefi"
profile = "release"

[[image_test]]
name = "boots-and-serves"
image = "appliance"
scenario = "fixtures/boots-and-serves.toml"
boot_timeout_ns = 30000000000
shutdown_timeout_ns = 5000000000
maximum_events = 10000
maximum_output_bytes = 1048576
deterministic_seed = 42
