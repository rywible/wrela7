# System LLVM prefix for inkwell/llvm-sys when the native backend feature is
# built. Points at the on-disk Homebrew LLVM 22 by default; override by
# exporting LLVM_SYS_221_PREFIX (or WRELA_LLVM_PREFIX) before invoking cargo.
[env]
LLVM_SYS_221_PREFIX = "/opt/homebrew/opt/llvm"
WRELA_LLVM_PREFIX = "/opt/homebrew/opt/llvm"

[alias]
xtask = "run --locked --offline --package xtask --"
xarch = "run --locked --offline --package xtask -- architecture-check"
xdiag = "run --locked --offline --package xtask -- diagnostic-index"
xcheck = "run --locked --offline --package xtask -- check"
xtest = "run --locked --offline --package xtask -- test"
xlint = "run --locked --offline --package xtask -- lint"
xgate = "run --locked --offline --package xtask -- gate"
xnightly = "run --locked --offline --package xtask -- nightly"
xfmt = "fmt --all -- --check"
